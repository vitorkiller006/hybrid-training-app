<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Training & Nutrition</title>
    <meta name="description" content="App híbrido focado em recomposição corporal, força e corrida.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <h1 class="logo">O<span class="neon-text">N</span>E</h1>
            <nav>
                <button class="nav-btn active" data-tab="treino">Treino</button>
                <button class="nav-btn" data-tab="nutricao">Nutrição</button>
                <button class="nav-btn" data-tab="historico">Histórico</button>
            </nav>
        </header>

        <main class="dashboard">
            <!-- ABA: TREINO -->
            <section id="tab-treino" class="card training-today glass-panel tab-section">
                <div class="card-header">
                    <h2>Treino de Hoje</h2>
                    <span class="badge badge-hybrid">LISS / Recovery</span>
                </div>
                <div class="card-body">
                    <p id="dynamic-engine-alert" class="rpe-status" style="margin-top: 1rem; color: var(--secondary-color); font-size: 0.9rem; font-style: italic;"></p>
                    <button class="btn-primary start-workout">INICIAR SESSÃO DE HOJE</button>
                </div>
            </section>

            <!-- ABA: NUTRIÇÃO -->
            <section id="tab-nutricao" class="card nutrition-today glass-panel tab-section" style="display: none;">
                <div class="card-header">
                    <h2>Nutrição (Ciclo)</h2>
                    <span class="badge badge-carb-low">Carboidratos Baixos</span>
                </div>
                <div class="card-body">
                    <p class="rpe-status">TDEE ajustado para preservação de glicogênio e priorização de queima lipídica.</p>
                    <div class="macros">
                        <div class="macro-item">
                            <span class="label">PRO</span>
                            <span class="value">180g</span>
                        </div>
                        <div class="macro-item">
                            <span class="label">CARB</span>
                            <span class="value">120g</span>
                        </div>
                        <div class="macro-item">
                            <span class="label">FAT</span>
                            <span class="value">70g</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ABA: HISTÓRICO -->
            <section id="tab-historico" class="card history glass-panel tab-section" style="display: none;">
                <div class="card-header">
                    <h2>Histórico</h2>
                </div>
                <div class="card-body">
                    <p class="rpe-status">Nenhum treino armazenado no IndexedDB ainda.</p>
                </div>
            </section>
            <!-- MODO DE TREINO ATIVO -->
            <section id="workout-mode" class="glass-panel" style="display: none; grid-column: 1 / -1;">
                <div class="card-header">
                    <h2 id="wm-title">Sessão em Andamento</h2>
                    <button class="nav-btn" id="wm-cancel" style="color: var(--primary-color);">Abortar</button>
                </div>
                <div class="wm-carousel">
                    <!-- Cards will be injected by JS -->
                </div>
                <div class="wm-controls" style="display: flex; justify-content: space-between; margin-top: 2rem;">
                    <button class="nav-btn" id="wm-prev" style="display: none;">Anterior</button>
                    <button class="btn-primary" id="wm-next" style="width: 48%; margin-top: 0;">Próximo</button>
                    <button class="btn-primary" id="wm-finish" style="display: none; width: 48%; margin-top: 0; background: linear-gradient(135deg, #00e676, #1b5e20);">Finalizar</button>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
